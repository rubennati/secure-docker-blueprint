services:

  # --------------------------------------------------------
  # HOMARR
  # Modern self-hosted dashboard with an extensive
  # integration library (service status, torrent clients,
  # media servers, Proxmox, etc.).
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: ghcr.io/homarr-labs/homarr:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    # NOTE: cap_drop not set — Homarr starts as UID=0 and runs an internal
    # Redis server; dropping ALL capabilities would break both.

    # --- Resource Limits ---
    # Homarr bundles Next.js + Redis + background cron jobs in one container.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
        reservations:
          memory: 256M
    pids_limit: 200

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      # 64-character hex encryption key (openssl rand -hex 32)
      # See README "Setup" section for generation instructions.
      SECRET_ENCRYPTION_KEY: ${HOMARR_SECRET_ENCRYPTION_KEY}

    # --- Storage ---
    volumes:
      - ./volumes/appdata:/appdata
      # OPTIONAL: Docker integration (service status, container controls).
      # The socket-proxy pattern from core/traefik/ is safer than direct
      # socket mount — re-enable only after considering the trade-off.
      # See README "Docker integration" for details.
      # - /var/run/docker.sock:/var/run/docker.sock:ro

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:${APP_INTERNAL_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true
