services:

  # --------------------------------------------------------
  # DASHY
  # Self-hosted dashboard for your homelab services.
  # Config-driven (YAML), static UI, no external database.
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: lissy93/dashy:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # --- Resource Limits ---
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
          pids: 100
        reservations:
          memory: 64M

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      NODE_ENV: production

    # --- Storage ---
    volumes:
      # Your dashboard configuration (sections, icons, bookmarks, etc.)
      - ./config/conf.yml:/app/user-data/conf.yml:ro

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck.js"]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true
