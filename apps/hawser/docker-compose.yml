services:

  # --------------------------------------------------------
  # HAWSER
  # Remote Docker agent for Dockhand.
  # Deploy on each host that Dockhand should manage.
  #
  # Edge Mode: agent connects outbound to Dockhand (default)
  #   → No port opening, works behind NAT/Firewall/Tailscale
  #
  # NOTE: No Traefik routing – this is a Docker API agent,
  # not a web application.
  #
  # TODO: Add socket-proxy when Hawser supports TCP
  # (PR #52: https://github.com/Finsys/hawser/pull/52)
  # --------------------------------------------------------
  hawser:
    # --- Identity ---
    image: ghcr.io/finsys/hawser:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    environment:
      DOCKHAND_SERVER_URL: ${DOCKHAND_SERVER_URL}
      AGENT_NAME: ${AGENT_NAME}
      LOG_LEVEL: ${LOG_LEVEL}
      STACKS_DIR: /data/stacks

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes/stacks:/data/stacks

    secrets:
      - HAWSER_TOKEN

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2376/_hawser/health 2>/dev/null | grep -q healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  HAWSER_TOKEN:
    file: ./.secrets/hawser_token.txt
