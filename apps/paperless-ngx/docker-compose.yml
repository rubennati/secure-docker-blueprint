services:

  # --------------------------------------------------------
  # DATABASE
  # --------------------------------------------------------
  database:
    # --- Identity ---
    image: ${DB_IMAGE}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PWD
      TZ: ${TIMEZONE}
    secrets:
      - DB_PWD

    # --- Storage ---
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------
  # REDIS
  # --------------------------------------------------------
  redis:
    # --- Identity ---
    image: ${REDIS_IMAGE}
    container_name: ${CONTAINER_NAME_REDIS}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # --- Storage ---
    volumes:
      - ./volumes/redis:/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # GOTENBERG (document conversion)
  # --------------------------------------------------------
  gotenberg:
    # --- Identity ---
    image: ${GOTENBERG_IMAGE}
    container_name: ${CONTAINER_NAME_GOTENBERG}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

    # --- Networking ---
    networks:
      - app-internal

  # --------------------------------------------------------
  # TIKA (text extraction)
  # --------------------------------------------------------
  tika:
    # --- Identity ---
    image: ${TIKA_IMAGE}
    container_name: ${CONTAINER_NAME_TIKA}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Networking ---
    networks:
      - app-internal

  # --------------------------------------------------------
  # PAPERLESS-NGX
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: ${APP_IMAGE}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_started
      tika:
        condition: service_started

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    # NOTE: Do NOT set `user:` here. Paperless uses s6-overlay which must start
    # as root to set up /run, then drops privileges to USERMAP_UID/GID internally.

    # --- Configuration ---
    environment:
      USERMAP_UID: ${USERMAP_UID}
      USERMAP_GID: ${USERMAP_GID}
      PAPERLESS_URL: https://${APP_TRAEFIK_HOST}
      PAPERLESS_DBHOST: database
      PAPERLESS_DBNAME: ${DB_NAME}
      PAPERLESS_DBUSER: ${DB_USER}
      PAPERLESS_DBPASS_FILE: /run/secrets/DB_PWD
      PAPERLESS_SECRET_KEY_FILE: /run/secrets/SECRET_KEY
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_TIME_ZONE: ${TIMEZONE}
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE}
      PAPERLESS_OCR_LANGUAGES: ${PAPERLESS_OCR_LANGUAGES}
      PAPERLESS_OCR_PAGES: ${PAPERLESS_OCR_PAGES}
      PAPERLESS_OCR_USER_ARGS: '{"invalidate_digital_signatures":true,"continue_on_soft_render_error":true}'
      PAPERLESS_WEBSERVER_WORKERS: ${PAPERLESS_WORKERS}
      PAPERLESS_TASK_WORKERS: ${PAPERLESS_TASK_WORKERS}
      PAPERLESS_THREADS_PER_WORKER: ${PAPERLESS_THREADS}
    secrets:
      - DB_PWD
      - SECRET_KEY

    # --- Storage ---
    volumes:
      - ./volumes/data:/usr/src/paperless/data
      - ./volumes/media:/usr/src/paperless/media
      - ./volumes/consume:/usr/src/paperless/consume
      - ./volumes/export:/usr/src/paperless/export

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${COMPOSE_PROJECT_NAME}-headers@docker,${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"
      - "traefik.docker.network=proxy-public"
      # Custom headers for correct URL generation behind reverse proxy
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.customrequestheaders.X-Forwarded-Host=${APP_TRAEFIK_HOST}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
  SECRET_KEY:
    file: ./.secrets/secret_key.txt
