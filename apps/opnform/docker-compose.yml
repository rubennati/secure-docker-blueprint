services:

  # --------------------------------------------------------
  # DATABASE (PostgreSQL)
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: postgres:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PWD
      TZ: ${TZ}
    secrets:
      - DB_PWD

    # --- Storage ---
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------
  # REDIS (cache + queue + sessions)
  # --------------------------------------------------------
  redis:
    # --- Identity ---
    image: redis:${REDIS_TAG}
    container_name: ${CONTAINER_NAME_REDIS}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # --- Storage ---
    volumes:
      - ./volumes/redis:/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # API (Laravel — php-fpm on port 9000)
  # --------------------------------------------------------
  api:
    # --- Identity ---
    image: jhumanj/opnform-api:${APP_TAG}
    container_name: ${CONTAINER_NAME_API}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${APP_TRAEFIK_HOST}
      FRONT_URL: https://${APP_TRAEFIK_HOST}
      APP_KEY: ${APP_KEY}
      APP_TRUSTED_PROXIES: "*"
      # Secrets shared with Nuxt UI (SSR authentication)
      JWT_SECRET: ${JWT_SECRET}
      FRONT_API_SECRET: ${FRONT_API_SECRET}
      # Database
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      # Laravel reads DB_PASSWORD from env only (no _FILE support).
      # Value must match .secrets/db_pwd.txt.
      DB_PASSWORD: ${DB_PWD_INLINE}
      # Cache + queue + sessions via Redis
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Storage — local filesystem inside the container
      FILESYSTEM_DRIVER: local
      LOCAL_FILESYSTEM_VISIBILITY: public
      # PHP limits
      PHP_MEMORY_LIMIT: "1G"
      PHP_MAX_EXECUTION_TIME: "600"
      PHP_UPLOAD_MAX_FILESIZE: "64M"
      PHP_POST_MAX_SIZE: "64M"
      # Mail — log driver by default, switch to SMTP in prod
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      # Self-hosted mode
      SELF_HOSTED: "true"

    # --- Storage ---
    # Path must match the image's internal storage location.
    volumes:
      - ./volumes/storage:/usr/share/nginx/html/storage

    # --- Networking ---
    # proxy-public gives outbound internet access (email, OAuth, etc.)
    # app-internal reaches db and redis
    networks:
      - proxy-public
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "php /usr/share/nginx/html/artisan about || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # --------------------------------------------------------
  # API WORKER (Laravel queue processor)
  # --------------------------------------------------------
  api-worker:
    # --- Identity ---
    image: jhumanj/opnform-api:${APP_TAG}
    container_name: ${CONTAINER_NAME_API_WORKER}
    restart: unless-stopped
    command: ["php", "artisan", "queue:work"]
    depends_on:
      api:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONT_API_SECRET: ${FRONT_API_SECRET}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PWD_INLINE}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FILESYSTEM_DRIVER: local
      LOCAL_FILESYSTEM_VISIBILITY: public
      MAIL_MAILER: ${MAIL_MAILER}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      SELF_HOSTED: "true"

    # --- Storage ---
    volumes:
      - ./volumes/storage:/usr/share/nginx/html/storage

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'php artisan queue:work' > /dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------
  # API SCHEDULER (Laravel cron / schedule:work)
  # --------------------------------------------------------
  api-scheduler:
    # --- Identity ---
    image: jhumanj/opnform-api:${APP_TAG}
    container_name: ${CONTAINER_NAME_API_SCHEDULER}
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      api:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FRONT_API_SECRET: ${FRONT_API_SECRET}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PWD_INLINE}
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FILESYSTEM_DRIVER: local
      LOCAL_FILESYSTEM_VISIBILITY: public
      SELF_HOSTED: "true"

    # --- Storage ---
    volumes:
      - ./volumes/storage:/usr/share/nginx/html/storage

    # --- Networking ---
    networks:
      - app-internal

  # --------------------------------------------------------
  # UI (Nuxt SSR frontend — port 3000)
  # --------------------------------------------------------
  ui:
    # --- Identity ---
    image: jhumanj/opnform-client:${APP_TAG}
    container_name: ${CONTAINER_NAME_UI}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      # Public (browser-facing) API base — relative path, nginx routes it
      NUXT_PUBLIC_APP_URL: https://${APP_TRAEFIK_HOST}
      NUXT_PUBLIC_API_BASE: /api
      # Private (SSR server-side) API base — goes directly to nginx inside Docker,
      # bypasses public DNS and avoids EAI_AGAIN errors on internal networks
      NUXT_PRIVATE_API_BASE: http://nginx/api
      # Shared secret with the API (must match FRONT_API_SECRET)
      NUXT_API_SECRET: ${FRONT_API_SECRET}

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # --------------------------------------------------------
  # NGINX (HTTP entry point — routes to api:9000 or ui:3000)
  # --------------------------------------------------------
  nginx:
    # --- Identity ---
    image: nginx:${NGINX_TAG}
    container_name: ${CONTAINER_NAME_NGINX}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      ui:
        condition: service_started

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      NGINX_MAX_BODY_SIZE: ${NGINX_MAX_BODY_SIZE:-64m}
    volumes:
      - ./docker/nginx.conf:/etc/nginx/templates/default.conf.template:ro

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80"

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    # internal: false (default) — outbound internet access required.
    # The Nuxt UI server calls api.iconify.design at SSR startup to resolve icons.
    # Setting internal: true blocks that and causes EAI_AGAIN DNS failures in the
    # ui container. Isolation is provided at the Traefik layer (only nginx is
    # exposed); db and redis are not on proxy-public, so they remain unreachable
    # from outside Docker regardless.

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
