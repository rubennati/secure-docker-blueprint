# OpnForm nginx — routes /api, /open, /storage, /forms (POST) to php-fpm;
# proxies everything else to the Nuxt UI.
# NGINX_MAX_BODY_SIZE is injected by nginx's envsubst entrypoint at startup.

map $request_uri $api_uri {
    ~^/api(/.*$) $1;
    default      $request_uri;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html/public;
    client_max_body_size ${NGINX_MAX_BODY_SIZE};

    access_log /dev/stdout;
    error_log  /dev/stderr error;

    index index.html index.htm index.php;

    # --- Nuxt UI (catch-all) ---
    location / {
        proxy_http_version 1.1;
        proxy_pass         http://ui:3000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
    }

    # --- Icon proxy (must come before the /api/ regex) ---
    # /api/_nuxt_icon/* is served by the Nuxt icon server, not the Laravel API.
    # The ^~ prefix makes this an exact-prefix match and prevents the regex below
    # from catching it and sending it to php-fpm.
    location ^~ /api/_nuxt_icon/ {
        proxy_http_version 1.1;
        proxy_pass         http://ui:3000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
    }

    # --- Laravel API paths ---
    location ~/(api|open|local\/temp|forms\/assets)/ {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass            api:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI     $api_uri;
    }

    # --- Block dotfiles ---
    location ~ /\. {
        deny all;
    }
}
