services:

  # --------------------------------------------------------
  # HOMEPAGE (gethomepage)
  # Highly-configurable self-hosted dashboard with file-based
  # YAML configs per concern (services, bookmarks, widgets, etc.).
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: ghcr.io/gethomepage/homepage:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      # Comma-separated list of hosts Next.js will trust (Host header).
      # Derived from the Traefik hostname to avoid IP-leak drift.
      HOMEPAGE_ALLOWED_HOSTS: ${APP_TRAEFIK_HOST}

    # --- Storage ---
    volumes:
      - ./config:/app/config
      # OPTIONAL: Docker integration (service discovery, status badges).
      # Direct socket mount = broad Docker access. Prefer the socket-proxy
      # pattern from core/traefik/ for production; see README "Docker
      # integration" for details.
      # - /var/run/docker.sock:/var/run/docker.sock:ro

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true
