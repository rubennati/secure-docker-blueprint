services:

  # --------------------------------------------------------
  # DATABASE
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: ${DB_IMAGE}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/DB_ROOT_PWD
      MYSQL_LOG_CONSOLE: "true"
      MARIADB_AUTO_UPGRADE: "1"
      TZ: ${TIMEZONE}
    secrets:
      - DB_ROOT_PWD

    # --- Storage ---
    volumes:
      - ./volumes/mysql:/var/lib/mysql

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--mariadbupgrade", "--innodb_initialized"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # MEMCACHED
  # --------------------------------------------------------
  memcached:
    # --- Identity ---
    image: ${MEMCACHED_IMAGE}
    container_name: ${CONTAINER_NAME_MEMCACHED}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    entrypoint: memcached -m 256

    # --- Networking ---
    networks:
      - app-internal

  # --------------------------------------------------------
  # REDIS
  # --------------------------------------------------------
  redis:
    # --- Identity ---
    image: ${REDIS_IMAGE}
    container_name: ${CONTAINER_NAME_REDIS}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    command: ["sh", "-c", "redis-server --requirepass \"$$(cat /run/secrets/REDIS_PWD)\""]
    secrets:
      - REDIS_PWD

    # --- Storage ---
    volumes:
      - ./volumes/redis:/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/REDIS_PWD)\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------
  # SEAFILE SERVER
  # --------------------------------------------------------
  seafile:
    # --- Identity ---
    image: ${APP_IMAGE}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
      redis:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # NOTE: Seafile's init scripts (utils.py, bootstrap.py) read passwords
    # via os.environ only — no _FILE support. The custom entrypoint reads
    # secrets from /run/secrets/ and exports them as env vars.
    entrypoint: ["/bin/sh", "/config/entrypoint.sh", "/sbin/my_init", "--", "/scripts/enterpoint.sh"]
    environment:
      # --- Database ---
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${SEAFILE_DB_USER}
      SEAFILE_MYSQL_DB_HOST: db
      SEAFILE_MYSQL_DB_USER: ${SEAFILE_DB_USER}
      SEAFILE_MYSQL_DB_CCNET_DB_NAME: ccnet_db
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
      SEAFILE_MYSQL_DB_SEAHUB_DB_NAME: seahub_db
      # --- Cache ---
      CACHE_PROVIDER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # --- Server ---
      SEAFILE_SERVER_HOSTNAME: ${APP_TRAEFIK_HOST}
      SEAFILE_SERVER_PROTOCOL: https
      SITE_ROOT: /
      ENABLE_GO_FILESERVER: "true"
      NON_ROOT: "false"
      SEAFILE_LOG_TO_STDOUT: "false"
      # --- Admin ---
      INIT_SEAFILE_ADMIN_EMAIL: ${SEAFILE_ADMIN_EMAIL}
      # --- SeaDoc ---
      ENABLE_SEADOC: ${SEAFILE_ENABLE_SEADOC}
      SEADOC_SERVER_URL: https://${APP_TRAEFIK_HOST}/sdoc-server
      # --- Notification ---
      ENABLE_NOTIFICATION_SERVER: ${SEAFILE_ENABLE_NOTIFICATION}
      NOTIFICATION_SERVER_URL: https://${APP_TRAEFIK_HOST}/notification
      INNER_NOTIFICATION_SERVER_URL: http://notification-server:8083
      # --- Time ---
      TIME_ZONE: ${TIMEZONE}
      TZ: ${TIMEZONE}
    secrets:
      - DB_ROOT_PWD
      - SEAFILE_DB_PWD
      - SEAFILE_ADMIN_PWD
      - JWT_KEY
      - REDIS_PWD

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./config/seahub_custom.py:/config/seahub_custom.py:ro
      - ./volumes/seafile-data:/shared

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-public"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_ROOT_PWD:
    file: ./secrets/db_root_pwd.txt
  SEAFILE_DB_PWD:
    file: ./secrets/seafile_db_pwd.txt
  SEAFILE_ADMIN_PWD:
    file: ./secrets/seafile_admin_pwd.txt
  JWT_KEY:
    file: ./secrets/jwt_key.txt
  REDIS_PWD:
    file: ./secrets/redis_pwd.txt
