services:

  # --------------------------------------------------------
  # NOTIFICATION SERVER (real-time file change updates – optional)
  # --------------------------------------------------------
  notification-server:
    # --- Identity ---
    image: ${NOTIFICATION_SERVER_IMAGE}
    container_name: ${CONTAINER_NAME_NOTIFICATION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      seafile:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      SEAFILE_MYSQL_DB_HOST: db
      SEAFILE_MYSQL_DB_PORT: "3306"
      SEAFILE_MYSQL_DB_USER: ${SEAFILE_DB_USER}
      SEAFILE_MYSQL_DB_PASSWORD_FILE: /run/secrets/SEAFILE_DB_PWD
      SEAFILE_MYSQL_DB_CCNET_DB_NAME: ccnet_db
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
      JWT_PRIVATE_KEY_FILE: /run/secrets/JWT_KEY
      SEAFILE_LOG_TO_STDOUT: "false"
      NOTIFICATION_SERVER_LOG_LEVEL: ${NOTIFICATION_LOG_LEVEL}
    secrets:
      - SEAFILE_DB_PWD
      - JWT_KEY

    # --- Storage ---
    volumes:
      - ./volumes/seafile-data/seafile/logs:/shared/seafile/logs

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/notification`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-notification.loadbalancer.server.port=8083"
      - "traefik.docker.network=proxy-public"

# --------------------------------------------------------
# NETWORKS (shared with seafile-server.yml)
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS (shared with seafile-server.yml)
# --------------------------------------------------------
secrets:
  SEAFILE_DB_PWD:
    file: ./secrets/seafile_db_pwd.txt
  JWT_KEY:
    file: ./secrets/jwt_key.txt
