services:

  # --------------------------------------------------------
  # SEADOC (collaborative document editing – optional)
  # --------------------------------------------------------
  seadoc:
    # --- Identity ---
    image: ${SEADOC_IMAGE}
    container_name: ${CONTAINER_NAME_SEADOC}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # NOTE: SeaDoc does not support _FILE env vars.
    # The shared entrypoint reads secrets and exports them as env vars.
    entrypoint: ["/bin/sh", "/config/entrypoint.sh", "/sbin/my_init", "--", "/scripts/enterpoint.sh"]
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${SEAFILE_DB_USER}
      DB_NAME: seahub_db
      TIME_ZONE: ${TIMEZONE}
      NON_ROOT: "false"
      SEAHUB_SERVICE_URL: http://seafile
    secrets:
      - SEAFILE_DB_PWD
      - JWT_KEY

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./volumes/seadoc-data:/shared

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      # socket.io needs its own router (no path stripping)
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc-ws.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/socket.io/`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc-ws.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc-ws.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc-ws.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc-ws.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc-ws.service=${COMPOSE_PROJECT_NAME}-seadoc"
      # sdoc-server API (strip /sdoc-server prefix)
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/sdoc-server`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-seadoc.middlewares=seadoc-strip@docker"
      - "traefik.http.middlewares.seadoc-strip.stripprefix.prefixes=/sdoc-server"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-seadoc.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-public"

# --------------------------------------------------------
# NETWORKS (shared with seafile-server.yml)
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS (shared with seafile-server.yml)
# --------------------------------------------------------
secrets:
  SEAFILE_DB_PWD:
    file: ./secrets/seafile_db_pwd.txt
  JWT_KEY:
    file: ./secrets/jwt_key.txt
