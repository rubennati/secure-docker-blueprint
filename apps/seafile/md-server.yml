services:

  # --------------------------------------------------------
  # METADATA SERVER (file metadata management – optional)
  # --------------------------------------------------------
  seafile-md-server:
    # --- Identity ---
    image: ${MD_SERVER_IMAGE}
    container_name: ${CONTAINER_NAME_MD_SERVER}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seafile:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # NOTE: md-server is a Go service — no _FILE support.
    # The shared entrypoint reads secrets and exports them as env vars.
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    command: ["bash", "-c", "/opt/scripts/entrypoint.sh"]
    environment:
      SEAFILE_MYSQL_DB_HOST: db
      SEAFILE_MYSQL_DB_PORT: "3306"
      SEAFILE_MYSQL_DB_USER: ${SEAFILE_DB_USER}
      SEAFILE_MYSQL_DB_SEAFILE_DB_NAME: seafile_db
      CACHE_PROVIDER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SEAFILE_LOG_TO_STDOUT: "false"
      MD_PORT: "8084"
      MD_LOG_LEVEL: ${MD_LOG_LEVEL}
      MD_MAX_CACHE_SIZE: ${MD_MAX_CACHE_SIZE}
      MD_FILE_COUNT_LIMIT: ${MD_FILE_COUNT_LIMIT}
      MD_STORAGE_TYPE: disk
    secrets:
      - SEAFILE_DB_PWD
      - JWT_KEY
      - REDIS_PWD

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./volumes/seafile-data:/shared

    # --- Networking ---
    networks:
      - app-internal

# --------------------------------------------------------
# NETWORKS (shared with seafile-server.yml)
# --------------------------------------------------------
networks:
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS (shared with seafile-server.yml)
# --------------------------------------------------------
secrets:
  SEAFILE_DB_PWD:
    file: ./.secrets/seafile_db_pwd.txt
  JWT_KEY:
    file: ./.secrets/jwt_key.txt
  REDIS_PWD:
    file: ./.secrets/redis_pwd.txt
