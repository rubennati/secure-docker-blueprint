services:

  # --------------------------------------------------------
  # DATABASE (PostgreSQL + pgvectors + vectorchord for ML)
  # --------------------------------------------------------
  db:
    # --- Identity ---
    # Immich requires their custom Postgres image with pgvectors + vectorchord
    # extensions. Digest is pinned upstream — do NOT substitute a stock postgres.
    image: ghcr.io/immich-app/postgres:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped
    shm_size: 128mb

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PWD
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: ${TZ}
    secrets:
      - DB_PWD

    # --- Storage ---
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------
  # REDIS (Valkey — task queue / cache)
  # --------------------------------------------------------
  redis:
    # --- Identity ---
    image: valkey/valkey:${REDIS_TAG}
    container_name: ${CONTAINER_NAME_REDIS}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # --- Storage ---
    volumes:
      - ./volumes/redis:/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------
  # MACHINE LEARNING (CLIP, facial recognition)
  # --------------------------------------------------------
  # For hardware acceleration (CUDA / OpenVINO / ROCm / ARM NN / RKNN) see:
  # https://docs.immich.app/features/ml-hardware-acceleration
  machine-learning:
    # --- Identity ---
    image: ghcr.io/immich-app/immich-machine-learning:${APP_TAG}
    container_name: ${CONTAINER_NAME_ML}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}

    # --- Storage ---
    volumes:
      - ./volumes/model-cache:/cache

    # --- Networking ---
    networks:
      - app-internal
      - ml-outbound    # needs outbound internet to download CLIP models from HuggingFace

  # --------------------------------------------------------
  # IMMICH SERVER (web UI + API)
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: ghcr.io/immich-app/immich-server:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      machine-learning:
        condition: service_started

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      # Database — immich-server reads DB_PASSWORD from env only (no _FILE
      # support). Value here must match contents of .secrets/db_pwd.txt.
      DB_HOSTNAME: db
      DB_PORT: "5432"
      DB_DATABASE_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PWD_INLINE}
      # Redis
      REDIS_HOSTNAME: redis
      REDIS_PORT: "6379"
      # ML
      IMMICH_MACHINE_LEARNING_URL: http://machine-learning:3003

    # --- Storage ---
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"


# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true      # DB + Redis: no outbound internet

  ml-outbound:
    name: ${COMPOSE_PROJECT_NAME}-ml-outbound
    # No internal: true — ML needs outbound internet to download CLIP models
    # from HuggingFace on first start. Once cached in volumes/model-cache,
    # no further outbound calls are made.

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
