services:

  # --------------------------------------------------------
  # PAPERLESS MCP SERVER
  # Model Context Protocol server for AI assistants.
  # Connects to Paperless-ngx API for document management.
  #
  # Source: https://github.com/nloui/paperless-mcp
  #
  # Prerequisites:
  #   - Paperless-ngx running (apps/paperless-ngx)
  #   - API token generated in Paperless UI:
  #     → Profile (top right) → My Profile → Token → Copy
  #
  # Usage with Claude Code / Claude Desktop:
  #   claude mcp add paperless --transport http https://<APP_TRAEFIK_HOST>/mcp
  # --------------------------------------------------------
  app:
    # --- Identity ---
    build:
      context: ./build
      dockerfile: Dockerfile
    image: paperless-mcp:local
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true

    # --- Configuration ---
    # In HTTP mode, the MCP server reads config from environment variables.
    # The API token is injected from a Docker Secret via entrypoint.
    entrypoint: ["/bin/sh", "-c", "export API_KEY=\"$(cat /run/secrets/MCP_API_TOKEN)\" && exec node index.js --http --port 3000"]
    environment:
      PAPERLESS_URL: ${PAPERLESS_URL}
    secrets:
      - MCP_API_TOKEN

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy-public"

    # --- Health & Observability ---
    # GET /mcp returns 405 (only POST allowed) — that confirms the server is up.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/mcp').then(r => process.exit(r.status === 405 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  MCP_API_TOKEN:
    file: ./secrets/mcp_api_token.txt
