services:

  # --------------------------------------------------------
  # DATABASE (PostgreSQL)
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: postgres:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PWD
      TZ: ${TZ}
    secrets:
      - DB_PWD

    # --- Storage ---
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------
  # CAL.COM
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: calcom/cal.com:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      # --- Core ---
      NODE_ENV: production
      NEXT_PUBLIC_WEBAPP_URL: https://${APP_TRAEFIK_HOST}
      NEXT_PUBLIC_API_V2_URL: https://${APP_TRAEFIK_HOST}/api/v2
      NEXTAUTH_URL: https://${APP_TRAEFIK_HOST}/api/auth
      NEXTAUTH_SECRET_FILE: /run/secrets/NEXTAUTH_SECRET
      CALENDSO_ENCRYPTION_KEY_FILE: /run/secrets/ENCRYPTION_KEY
      # --- Database ---
      # DATABASE_URL embeds the password inline because Prisma doesn't
      # support *_FILE or URL-from-parts. See README "Known Issues".
      DATABASE_URL: postgresql://${DB_USER}:${DB_PWD_INLINE}@db:5432/${DB_NAME}
      DATABASE_DIRECT_URL: postgresql://${DB_USER}:${DB_PWD_INLINE}@db:5432/${DB_NAME}
      # --- Licensing ---
      NEXT_PUBLIC_LICENSE_CONSENT: ${CALCOM_LICENSE_CONSENT}
      LICENSE: ${CALCOM_LICENSE}
      # --- Telemetry ---
      CALCOM_TELEMETRY_DISABLED: ${CALCOM_TELEMETRY_DISABLED}
      # --- Email ---
      EMAIL_FROM: ${CALCOM_EMAIL_FROM}
      EMAIL_FROM_NAME: ${CALCOM_EMAIL_FROM_NAME}
      EMAIL_SERVER_HOST: ${CALCOM_SMTP_HOST}
      EMAIL_SERVER_PORT: ${CALCOM_SMTP_PORT}
      EMAIL_SERVER_USER: ${CALCOM_SMTP_USER}
      EMAIL_SERVER_PASSWORD_FILE: /run/secrets/SMTP_PWD
      # --- Branding ---
      NEXT_PUBLIC_APP_NAME: ${CALCOM_APP_NAME}
      NEXT_PUBLIC_COMPANY_NAME: ${CALCOM_COMPANY_NAME}
      NEXT_PUBLIC_SUPPORT_MAIL_ADDRESS: ${CALCOM_SUPPORT_EMAIL}
      # --- Legal ---
      NEXT_PUBLIC_WEBSITE_TERMS_URL: ${CALCOM_TERMS_URL}
      NEXT_PUBLIC_WEBSITE_PRIVACY_POLICY_URL: ${CALCOM_PRIVACY_URL}
      # --- Organization ---
      ORGANIZATIONS_ENABLED: ${CALCOM_ORGS_ENABLED}
      NEXT_PUBLIC_SINGLE_ORG_SLUG: ${CALCOM_SINGLE_ORG_SLUG}
      ALLOWED_HOSTNAMES: ${CALCOM_ALLOWED_HOSTNAMES}
      TZ: ${TZ}
    secrets:
      - DB_PWD
      - NEXTAUTH_SECRET
      - ENCRYPTION_KEY
      - SMTP_PWD

    # --- Storage ---
    volumes:
      - ./volumes/data:/app/data

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
  NEXTAUTH_SECRET:
    file: ./.secrets/nextauth_secret.txt
  ENCRYPTION_KEY:
    file: ./.secrets/encryption_key.txt
  SMTP_PWD:
    file: ./.secrets/smtp_pwd.txt
