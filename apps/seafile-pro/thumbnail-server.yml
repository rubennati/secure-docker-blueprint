services:

  # --------------------------------------------------------
  # THUMBNAIL SERVER (Image/Video Thumbnail Generation)
  # --------------------------------------------------------
  thumbnail-server:
    # --- Identity ---
    image: seafileltd/thumbnail-server:${THUMBNAIL_TAG}
    container_name: ${CONTAINER_NAME_THUMBNAIL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    entrypoint: ["/bin/sh", "/config/entrypoint.sh", "/scripts/enterpoint.sh"]
    environment:
      - TIME_ZONE=${TZ}
      - SEAFILE_MYSQL_DB_HOST=db
      - SEAFILE_MYSQL_DB_PORT=3306
      - SEAFILE_MYSQL_DB_USER=${DB_USER}
      - SEAFILE_MYSQL_DB_CCNET_DB_NAME=ccnet_db
      - SEAFILE_MYSQL_DB_SEAFILE_DB_NAME=seafile_db
      - NON_ROOT=false
      - SEAFILE_LOG_TO_STDOUT=false
      - SITE_ROOT=/
      - INNER_SEAHUB_SERVICE_URL=http://app
      - THUMBNAIL_IMAGE_ORIGINAL_SIZE_LIMIT=${THUMBNAIL_SIZE_LIMIT:-256}
      - SEAF_SERVER_STORAGE_TYPE=${SEAF_SERVER_STORAGE_TYPE:-disk}
      # S3 (only when SEAF_SERVER_STORAGE_TYPE=s3, uncomment and configure)
      #- S3_COMMIT_BUCKET=${S3_COMMIT_BUCKET:-}
      #- S3_FS_BUCKET=${S3_FS_BUCKET:-}
      #- S3_BLOCK_BUCKET=${S3_BLOCK_BUCKET:-}
      #- S3_KEY_ID=${S3_KEY_ID:-}
      #- S3_SECRET_KEY=${S3_SECRET_KEY:-}
      #- S3_USE_V4_SIGNATURE=${S3_USE_V4_SIGNATURE:-true}
      #- S3_AWS_REGION=${S3_AWS_REGION:-us-east-1}
      #- S3_HOST=${S3_HOST:-}
      #- S3_USE_HTTPS=${S3_USE_HTTPS:-true}
      #- S3_PATH_STYLE_REQUEST=${S3_PATH_STYLE_REQUEST:-false}
      #- S3_SSE_C_KEY=${S3_SSE_C_KEY:-}
    secrets:
      - SEAFILE_DB_PWD
      - JWT_KEY

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./volumes/seafile-data:/shared

    # --- Networking ---
    networks:
      - app-internal

networks:
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
