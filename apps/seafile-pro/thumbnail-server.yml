services:

  # --------------------------------------------------------
  # THUMBNAIL SERVER (Image/Video Thumbnail Generation)
  # --------------------------------------------------------
  thumbnail-server:
    # --- Identity ---
    image: seafileltd/thumbnail-server:${THUMBNAIL_TAG}
    container_name: ${CONTAINER_NAME_THUMBNAIL}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      - TIME_ZONE=${TZ}
      - SEAFILE_MYSQL_DB_HOST=db
      - SEAFILE_MYSQL_DB_PORT=3306
      - SEAFILE_MYSQL_DB_USER=${DB_USER}
      - SEAFILE_MYSQL_DB_PASSWORD=${SEAFILE_MYSQL_DB_PASSWORD}
      - SEAFILE_MYSQL_DB_CCNET_DB_NAME=ccnet_db
      - SEAFILE_MYSQL_DB_SEAFILE_DB_NAME=seafile_db
      - NON_ROOT=false
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - SEAFILE_LOG_TO_STDOUT=false
      - SITE_ROOT=/
      - INNER_SEAHUB_SERVICE_URL=http://app:80
      - THUMBNAIL_IMAGE_ORIGINAL_SIZE_LIMIT=${THUMBNAIL_SIZE_LIMIT:-256}
      - SEAF_SERVER_STORAGE_TYPE=${SEAF_SERVER_STORAGE_TYPE:-disk}

    # --- Storage ---
    volumes:
      - ./volumes/seafile-data:/shared

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router (priority=100: higher than main seafile catch-all)
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-thumbnail.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/thumbnail`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-thumbnail.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-thumbnail.priority=100"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-thumbnail.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-thumbnail.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-thumbnail.loadbalancer.server.port=80"

networks:
  proxy-public:
    external: true
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
