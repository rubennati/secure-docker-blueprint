services:

  # --------------------------------------------------------
  # SEASEARCH (Full-text Search)
  # Lightweight alternative to Elasticsearch, recommended by Seafile.
  # To use Elasticsearch instead, see UPSTREAM.md.
  # --------------------------------------------------------
  seasearch:
    # --- Identity ---
    image: seafileltd/seasearch:${SEASEARCH_TAG}
    container_name: ${CONTAINER_NAME_SEASEARCH}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      - SS_FIRST_ADMIN_USER=${SEAFILE_ADMIN_EMAIL}
      - SS_FIRST_ADMIN_PASSWORD=${INIT_SEAFILE_ADMIN_PASSWORD}
      - SS_MAX_OBJ_CACHE_SIZE=${SS_MAX_OBJ_CACHE_SIZE:-10GB}
      - SS_STORAGE_TYPE=${SS_STORAGE_TYPE:-disk}
      - SS_LOG_TO_STDOUT=false
      - SS_LOG_DIR=/opt/seasearch/data/log
      - SS_LOG_LEVEL=${SS_LOG_LEVEL:-info}

    # --- Storage ---
    volumes:
      - ./volumes/seasearch-data:/opt/seasearch/data

    # --- Networking ---
    networks:
      - app-internal

networks:
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
