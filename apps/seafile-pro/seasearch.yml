services:

  # --------------------------------------------------------
  # SEASEARCH (Full-text Search)
  # Lightweight alternative to Elasticsearch, recommended by Seafile.
  # To use Elasticsearch instead, see UPSTREAM.md.
  # --------------------------------------------------------
  seasearch:
    # --- Identity ---
    image: seafileltd/seasearch:${SEASEARCH_TAG}
    container_name: ${CONTAINER_NAME_SEASEARCH}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      - SS_FIRST_ADMIN_USER=${SEAFILE_ADMIN_EMAIL}
      - SS_MAX_OBJ_CACHE_SIZE=${SS_MAX_OBJ_CACHE_SIZE:-10GB}
      - SS_STORAGE_TYPE=${SS_STORAGE_TYPE:-disk}
      - SS_LOG_TO_STDOUT=false
      - SS_LOG_DIR=/opt/seasearch/data/log
      - SS_LOG_LEVEL=${SS_LOG_LEVEL:-info}
      # S3 (only when SS_STORAGE_TYPE=s3, uncomment and configure)
      #- S3_SS_BUCKET=${S3_SS_BUCKET:-}
      #- S3_KEY_ID=${S3_KEY_ID:-}
      #- S3_SECRET_KEY=${S3_SECRET_KEY:-}
      #- S3_AWS_REGION=${S3_AWS_REGION:-us-east-1}
      #- S3_HOST=${S3_HOST:-}
      #- S3_USE_HTTPS=${S3_USE_HTTPS:-true}
      #- S3_USE_V4_SIGNATURE=${S3_USE_V4_SIGNATURE:-true}
      #- S3_PATH_STYLE_REQUEST=${S3_PATH_STYLE_REQUEST:-true}
      #- S3_SSE_C_KEY=${S3_SSE_C_KEY:-}
    secrets:
      - SEAFILE_ADMIN_PWD

    # --- Storage ---
    volumes:
      - ./volumes/seasearch-data:/opt/seasearch/data

    # --- Networking ---
    networks:
      - app-internal

networks:
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
