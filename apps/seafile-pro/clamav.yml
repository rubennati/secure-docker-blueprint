services:

  # --------------------------------------------------------
  # CLAMAV (Antivirus Scanner – Optional)
  # Enable by adding clamav.yml to COMPOSE_FILE in .env
  # --------------------------------------------------------
  clamav:
    # --- Identity ---
    image: clamav/clamav:${CLAMAV_TAG}
    container_name: ${CONTAINER_NAME_CLAMAV}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Networking ---
    networks:
      - app-internal

networks:
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
