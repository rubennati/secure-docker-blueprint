services:

  # --------------------------------------------------------
  # SEADOC (Collaborative Document Editing)
  # --------------------------------------------------------
  seadoc:
    # --- Identity ---
    image: seafileltd/sdoc-server:${SEADOC_TAG}
    container_name: ${CONTAINER_NAME_SEADOC}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    entrypoint: ["/bin/sh", "/config/entrypoint.sh", "/scripts/enterpoint.sh"]
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_NAME=${SEADOC_DB_NAME:-seahub_db}
      - TIME_ZONE=${TZ}
      - NON_ROOT=false
      - SEAHUB_SERVICE_URL=http://app
    secrets:
      - SEAFILE_DB_PWD
      - JWT_KEY

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./volumes/seadoc-data:/shared

    # --- Networking ---
    networks:
      - app-internal

networks:
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
