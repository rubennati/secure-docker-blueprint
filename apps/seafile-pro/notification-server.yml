services:

  # --------------------------------------------------------
  # NOTIFICATION SERVER (Real-time File Change Notifications)
  # --------------------------------------------------------
  notification-server:
    # --- Identity ---
    image: seafileltd/notification-server:${NOTIFICATION_TAG}
    container_name: ${CONTAINER_NAME_NOTIFICATION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # NOTE: notification-server is a Go binary — no _FILE support, no shell entrypoint.
    # Our wrapper exports secrets as env vars, then exec's the binary.
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    command: ["/opt/seafile/notification-server", "-c", "/opt/seafile", "-l", "/shared/seafile/logs/notification-server.log"]
    environment:
      - SEAFILE_MYSQL_DB_HOST=db
      - SEAFILE_MYSQL_DB_PORT=3306
      - SEAFILE_MYSQL_DB_USER=${DB_USER}
      - SEAFILE_MYSQL_DB_CCNET_DB_NAME=ccnet_db
      - SEAFILE_MYSQL_DB_SEAFILE_DB_NAME=seafile_db
      - SEAFILE_LOG_TO_STDOUT=false
      - NOTIFICATION_SERVER_LOG_LEVEL=${NOTIFICATION_LOG_LEVEL:-info}
    secrets:
      - SEAFILE_DB_PWD
      - JWT_KEY

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./volumes/seafile-data/seafile/logs:/shared/seafile/logs

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router (priority=100: higher than main seafile catch-all)
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/notification`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.priority=100"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-notification.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-notification.loadbalancer.server.port=8083"

networks:
  proxy-public:
    external: true
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal

secrets:
  SEAFILE_DB_PWD:
    file: ./.secrets/seafile_db_pwd.txt
  JWT_KEY:
    file: ./.secrets/jwt_key.txt
