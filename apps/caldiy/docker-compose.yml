# =============================================================================
# Cal.diy — community / MIT edition of Cal.com
# =============================================================================
# Upstream positions Cal.diy as "strictly for personal, non-production use".
# If you run this in production, you accept that security fixes come from the
# community, not from Cal.com, Inc.
#
# IMAGE CAVEAT: verify the exact image tag at https://cal.diy/docs/docker
# before booting — the community edition publishes under a separate channel
# from the commercial calcom/cal.com image. This compose mirrors the
# `apps/calcom/` layout and will work once APP_IMAGE is pointed at the
# correct upstream registry path.
# =============================================================================

services:

  # --------------------------------------------------------
  # DATABASE (PostgreSQL)
  # --------------------------------------------------------
  db:
    image: postgres:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PWD
      TZ: ${TZ}
    secrets:
      - DB_PWD

    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

    networks:
      - app-internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # --------------------------------------------------------
  # CAL.DIY (community edition)
  # --------------------------------------------------------
  app:
    image: ${APP_IMAGE}:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true

    environment:
      TZ: ${TZ}
      NODE_ENV: production
      # URL
      NEXT_PUBLIC_WEBAPP_URL: https://${APP_TRAEFIK_HOST}
      NEXTAUTH_URL: https://${APP_TRAEFIK_HOST}
      # Secrets — same _FILE support as Cal.com
      NEXTAUTH_SECRET_FILE: /run/secrets/NEXTAUTH_SECRET
      CALENDSO_ENCRYPTION_KEY_FILE: /run/secrets/ENCRYPTION_KEY
      # Database — Prisma single DSN, no _FILE support
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PWD_INLINE}@db:5432/${DB_NAME}"
      # Telemetry off
      CALCOM_TELEMETRY_DISABLED: "1"
      # Licence — MIT community edition, no commercial key required
      NEXT_PUBLIC_LICENSE_CONSENT: agree
      # Email — SMTP only (no SES / SendGrid fancy stuff in community edition)
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER}
      EMAIL_SERVER_PASSWORD_FILE: /run/secrets/SMTP_PASSWORD
    secrets:
      - NEXTAUTH_SECRET
      - ENCRYPTION_KEY
      - SMTP_PASSWORD

    volumes:
      - ./volumes/data:/app/data

    networks:
      - proxy-public
      - app-internal

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

networks:
  proxy-public:
    external: true
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
  NEXTAUTH_SECRET:
    file: ./.secrets/nextauth_secret.txt
  ENCRYPTION_KEY:
    file: ./.secrets/encryption_key.txt
  SMTP_PASSWORD:
    file: ./.secrets/smtp_password.txt
