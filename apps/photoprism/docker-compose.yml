services:

  # --------------------------------------------------------
  # DATABASE (MariaDB)
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: mariadb:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped
    stop_grace_period: 15s

    # --- Security ---
    # NOTE: PhotoPrism's upstream compose uses `seccomp:unconfined` +
    # `apparmor:unconfined` on MariaDB due to an old io_uring issue:
    # https://github.com/MariaDB/mariadb-docker/issues/434
    # Left at defaults here — if MariaDB crashes on your kernel, uncomment
    # the workaround block.
    security_opt:
      - no-new-privileges:true
      # - seccomp:unconfined
      # - apparmor:unconfined
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

    # --- Configuration ---
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD_FILE: /run/secrets/DB_PWD
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/DB_ROOT_PWD
      TZ: ${TZ}
    command:
      - --innodb-buffer-pool-size=512M
      - --transaction-isolation=READ-COMMITTED
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=512
      - --innodb-rollback-on-timeout=OFF
      - --innodb-lock-wait-timeout=120
    secrets:
      - DB_PWD
      - DB_ROOT_PWD

    # --- Storage ---
    volumes:
      - ./volumes/database:/var/lib/mysql

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # PHOTOPRISM (Go app + TensorFlow)
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: photoprism/photoprism:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    stop_grace_period: 15s
    working_dir: "/photoprism"
    depends_on:
      db:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      PHOTOPRISM_UID: ${PUID}
      PHOTOPRISM_GID: ${PGID}
      # Site
      PHOTOPRISM_SITE_URL: https://${APP_TRAEFIK_HOST}/
      PHOTOPRISM_SITE_TITLE: ${SITE_TITLE}
      PHOTOPRISM_SITE_CAPTION: ${SITE_CAPTION}
      PHOTOPRISM_DEFAULT_LOCALE: ${DEFAULT_LOCALE}
      PHOTOPRISM_PLACES_LOCALE: ${PLACES_LOCALE}
      # TLS is terminated by Traefik — disable internal TLS
      PHOTOPRISM_DISABLE_TLS: "true"
      PHOTOPRISM_DEFAULT_TLS: "false"
      # Auth
      PHOTOPRISM_AUTH_MODE: "password"
      PHOTOPRISM_ADMIN_USER: ${ADMIN_USER}
      PHOTOPRISM_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Behaviour
      PHOTOPRISM_LOG_LEVEL: "info"
      PHOTOPRISM_READONLY: "false"
      PHOTOPRISM_EXPERIMENTAL: "false"
      PHOTOPRISM_DISABLE_WEBDAV: "false"
      PHOTOPRISM_DISABLE_SETTINGS: "false"
      PHOTOPRISM_DISABLE_TENSORFLOW: "false"
      PHOTOPRISM_DISABLE_FACES: "false"
      PHOTOPRISM_DISABLE_CLASSIFICATION: "false"
      PHOTOPRISM_DISABLE_RAW: "false"
      PHOTOPRISM_SIDECAR_YAML: "true"
      PHOTOPRISM_BACKUP_ALBUMS: "true"
      PHOTOPRISM_BACKUP_DATABASE: "true"
      PHOTOPRISM_BACKUP_SCHEDULE: "daily"
      PHOTOPRISM_DETECT_NSFW: "false"
      PHOTOPRISM_UPLOAD_NSFW: "true"
      PHOTOPRISM_UPLOAD_ARCHIVES: "true"
      PHOTOPRISM_UPLOAD_LIMIT: "5000"
      PHOTOPRISM_ORIGINALS_LIMIT: "5000"
      PHOTOPRISM_HTTP_COMPRESSION: "gzip"
      # Database
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "db:3306"
      PHOTOPRISM_DATABASE_NAME: ${DB_NAME}
      PHOTOPRISM_DATABASE_USER: ${DB_USER}
      # PhotoPrism reads DATABASE_PASSWORD from env only (no _FILE support).
      # Value must match contents of .secrets/db_pwd.txt.
      PHOTOPRISM_DATABASE_PASSWORD: ${DB_PWD_INLINE}
      # First-run init: download tensorflow models. `https` removed
      # because Traefik terminates TLS.
      PHOTOPRISM_INIT: "tensorflow"

    # --- Storage ---
    volumes:
      - ${ORIGINALS_PATH}:/photoprism/originals
      - ./volumes/storage:/photoprism/storage

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
  DB_ROOT_PWD:
    file: ./.secrets/db_root_pwd.txt
