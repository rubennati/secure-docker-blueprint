services:

  # --------------------------------------------------------
  # DATABASE (MySQL)
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: mysql:${DB_TAG}
    container_name: ${COMPOSE_PROJECT_NAME}-db
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

    # --- Configuration ---
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/DB_PWD
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/DB_ROOT_PWD
      TZ: ${TZ}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    secrets:
      - DB_PWD
      - DB_ROOT_PWD

    # --- Storage ---
    volumes:
      - ./volumes/mysql:/var/lib/mysql

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    # -p reads the root password from the secret file.
    # MYSQL_ROOT_PASSWORD_FILE is resolved by the MySQL entrypoint during init only,
    # not for subsequent healthcheck runs, so we read the file directly here.
    # -h 127.0.0.1 forces TCP — localhost resolves to a Unix socket on Linux,
    # which becomes ready before the TCP port, causing false-positive healthchecks.
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -p\"$(cat /run/secrets/DB_ROOT_PWD)\" -h 127.0.0.1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # GHOST
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: ghost:${APP_TAG}
    container_name: ${COMPOSE_PROJECT_NAME}-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # Ghost uses nconf-style hierarchical env vars (double-underscore as nesting).
    # Ghost does not support _FILE env vars — ops/entrypoint.sh reads the secrets
    # and exports them as the plain env vars Ghost expects before handing off.
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      url: https://${APP_TRAEFIK_HOST}
      database__client: mysql
      database__connection__host: db
      database__connection__port: "3306"
      database__connection__user: ${DB_USER}
      database__connection__database: ${DB_NAME}
      mail__from: ${GHOST_MAIL_FROM}
      mail__transport: SMTP
      mail__options__host: ${GHOST_MAIL_HOST}
      mail__options__service: ${GHOST_MAIL_SERVICE}
      mail__options__port: ${GHOST_MAIL_PORT}
      mail__options__secure: ${GHOST_MAIL_SECURE}
      mail__options__auth__user: ${GHOST_MAIL_USER}
      NODE_ENV: production
      TZ: ${TZ}
    secrets:
      - DB_PWD
      - GHOST_MAIL_PWD

    # --- Storage ---
    volumes:
      - ./ops/entrypoint.sh:/entrypoint.sh:ro
      - ./volumes/content:/var/lib/ghost/content

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:2368/',r=>{process.exit(0)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
  DB_ROOT_PWD:
    file: ./.secrets/db_root_pwd.txt
  GHOST_MAIL_PWD:
    file: ./.secrets/mail_pwd.txt
