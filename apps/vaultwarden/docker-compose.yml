services:

  # --------------------------------------------------------
  # DATABASE (MariaDB)
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: mariadb:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

    # --- Configuration ---
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
      TZ: ${TZ}

    # --- Storage ---
    volumes:
      - ./volumes/mysql:/var/lib/mysql

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # VAULTWARDEN
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: vaultwarden/server:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    # --- Configuration ---
    environment:
      # Core
      DOMAIN: https://${APP_TRAEFIK_HOST}
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
      TZ: ${TZ}
      # Registration & Access
      SIGNUPS_ALLOWED: ${VW_SIGNUPS_ALLOWED}
      SIGNUPS_VERIFY: "true"
      INVITATIONS_ALLOWED: ${VW_INVITATIONS_ALLOWED:-false}
      PASSWORD_HINTS_ALLOWED: "false"
      SHOW_PASSWORD_HINT: "false"
      # Admin (Argon2 hash — generate with: docker run --rm vaultwarden/server /vaultwarden hash)
      ADMIN_TOKEN: ${VW_ADMIN_TOKEN}
      ADMIN_RATELIMIT_SECONDS: "300"
      ADMIN_RATELIMIT_MAX_BURST: "3"
      ADMIN_SESSION_LIFETIME: "20"  # minutes
      # Login Rate Limiting
      LOGIN_RATELIMIT_SECONDS: "60"
      LOGIN_RATELIMIT_MAX_BURST: "10"
      # Security
      IP_HEADER: X-Real-IP
      PASSWORD_ITERATIONS: "600000"
      # Push Notifications (register at https://bitwarden.com/host/)
      PUSH_ENABLED: ${VW_PUSH_ENABLED:-false}
      PUSH_INSTALLATION_ID: ${VW_PUSH_INSTALLATION_ID:-}
      PUSH_INSTALLATION_KEY: ${VW_PUSH_INSTALLATION_KEY:-}
      # SMTP
      SMTP_HOST: ${VW_SMTP_HOST:-}
      SMTP_FROM: ${VW_SMTP_FROM:-}
      SMTP_FROM_NAME: Vaultwarden
      SMTP_PORT: ${VW_SMTP_PORT:-587}
      SMTP_SECURITY: ${VW_SMTP_SECURITY:-starttls}
      SMTP_USERNAME: ${VW_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${VW_SMTP_PASSWORD:-}
      # Logging
      LOG_LEVEL: ${VW_LOG_LEVEL:-warn}
      EXTENDED_LOGGING: "true"

    # --- Storage ---
    volumes:
      - ./volumes/data:/data

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=80"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

