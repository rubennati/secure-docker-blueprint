; ==========================================================
; PHP overrides for WordPress
; Mounted as /usr/local/etc/php/conf.d/zz-uploads.ini
; (zz prefix = loaded last, overrides everything)
; ==========================================================

; --- Upload & Memory Limits ---
upload_max_filesize = 64M
post_max_size = 64M
memory_limit = 256M
max_execution_time = 300

; --- Security ---
; Don't expose PHP version in HTTP headers (X-Powered-By)
expose_php = Off

; Disable dangerous functions that WordPress doesn't need.
; Prevents PHP shells from executing system commands if a plugin is compromised.
; NOTE: Some plugins (e.g. image optimization) may need exec(). If a plugin
; breaks, check its docs and selectively re-enable only what's needed.
disable_functions = exec,passthru,shell_exec,system,popen,proc_open,proc_close,proc_get_status,proc_nice,proc_terminate
