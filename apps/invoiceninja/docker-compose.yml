services:

  # --------------------------------------------------------
  # INVOICE NINJA (PHP-FPM + Supervisor)
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: invoiceninja/invoiceninja-debian:${APP_TAG}
    container_name: ${APP_CONTAINER}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    entrypoint: ["/bin/sh", "/config/entrypoint.sh", "/usr/local/bin/init.sh"]
    command: ["supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    env_file:
      - ./.env
    secrets:
      - DB_PWD
      - IN_USER_PWD

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage

    # --- Networking ---
    networks:
      - app-internal

  # --------------------------------------------------------
  # NGINX (Web Server)
  # --------------------------------------------------------
  nginx:
    # --- Identity ---
    image: nginx:${NGINX_TAG}
    container_name: ${NGINX_CONTAINER}
    restart: unless-stopped
    depends_on:
      - app

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run

    # --- Storage ---
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro

    # --- Networking ---
    networks:
      - app-internal
      - proxy-public

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${NETWORK_NAME}"
      - "traefik.http.routers.${ROUTER_NAME}.rule=Host(`${HOST_DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_NAME}.tls=true"
      #- "traefik.http.routers.${ROUTER_NAME}.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.${ROUTER_NAME}.tls.options=${TLS_OPTION}@file"
      - "traefik.http.routers.${ROUTER_NAME}.middlewares=${MIDDLEWARES}"
      - "traefik.http.routers.${ROUTER_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=80"

  # --------------------------------------------------------
  # MySQL
  # --------------------------------------------------------
  mysql:
    # --- Identity ---
    image: mysql:${MYSQL_TAG}
    container_name: ${MYSQL_CONTAINER}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD_FILE: /run/secrets/DB_PWD
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/DB_ROOT_PWD
    secrets:
      - DB_PWD
      - DB_ROOT_PWD

    # --- Storage ---
    volumes:
      - mysql_data:/var/lib/mysql

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$(cat /run/secrets/DB_ROOT_PWD) --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # Redis
  # --------------------------------------------------------
  redis:
    # --- Identity ---
    image: redis:${REDIS_TAG}
    container_name: ${REDIS_CONTAINER}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Storage ---
    volumes:
      - redis_data:/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

# --------------------------------------------------------
# VOLUMES
# --------------------------------------------------------
volumes:
  app_public:
    driver: local
  app_storage:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./secrets/db_pwd.txt
  DB_ROOT_PWD:
    file: ./secrets/db_root_pwd.txt
  IN_USER_PWD:
    file: ./secrets/in_user_pwd.txt
