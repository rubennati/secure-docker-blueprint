services:

  # --------------------------------------------------------
  # MONGODB (OpenSign backend store)
  # --------------------------------------------------------
  db:
    image: mongo:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/DB_ROOT_PWD
      MONGO_INITDB_DATABASE: ${DB_NAME}
      TZ: ${TZ}
    secrets:
      - DB_ROOT_PWD

    volumes:
      - ./volumes/mongodb:/data/db

    networks:
      - app-internal

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # BACKEND (OpenSign Server — Parse Server + Express)
  # --------------------------------------------------------
  api:
    image: opensign/opensignserver:${APP_TAG}
    container_name: ${CONTAINER_NAME_API}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true

    environment:
      TZ: ${TZ}
      # APP_ID is deprecated and must be the fixed value 'opensign' — do not generate a random value.
      APP_ID: opensign
      appName: ${APP_NAME}
      MASTER_KEY: ${MASTER_KEY}
      # MongoDB DSN — no _FILE support, DB_ROOT_PWD_INLINE must match secret.
      # Use alphanumeric-only password (DSN-safe: avoids @:/?# breaking the URI).
      MONGODB_URI: "mongodb://${DB_ROOT_USER}:${DB_ROOT_PWD_INLINE}@db:27017/${DB_NAME}?authSource=admin"
      # Path where Parse Server API is mounted (do not change).
      PARSE_MOUNT: /app
      # Internal URL — used by NodeJS cloud functions / webhooks calling Parse itself.
      # This is NOT the public URL; the client browser reaches Parse via PUBLIC_URL/app.
      SERVER_URL: "http://api:8080/app"
      PUBLIC_URL: "https://${APP_TRAEFIK_HOST}"
      # Use local volume storage instead of S3/DigitalOcean Spaces.
      USE_LOCAL: "true"
      # Document signing certificate (base64-encoded PFX/p12).
      # Generate a self-signed cert with the commands in README.md.
      # For eIDAS-valid signatures upload a qualified CA cert instead.
      PFX_BASE64: ${PFX_BASE64}
      PASS_PHRASE: ${PASS_PHRASE}
      # SMTP for signature request emails
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_SENDER: ${MAILGUN_SENDER}
      SMTP_ENABLE: ${SMTP_ENABLE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER_EMAIL: ${SMTP_USER_EMAIL}
      SMTP_PASS: ${SMTP_PASS}

    volumes:
      - ./volumes/api-files:/usr/src/app/files

    networks:
      - proxy-public
      - app-internal

    labels:
      # API router — serves /app/* (Parse Server API path, set via PARSE_MOUNT=/app)
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/app`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.priority=100"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-api.loadbalancer.server.port=8080"

  # --------------------------------------------------------
  # FRONTEND (React app)
  # --------------------------------------------------------
  ui:
    image: opensign/opensign:${APP_TAG}
    container_name: ${CONTAINER_NAME_UI}
    restart: unless-stopped
    depends_on:
      - api

    security_opt:
      - no-new-privileges:true

    environment:
      TZ: ${TZ}
      # Browser-side API URL — where the React app sends Parse requests.
      # Must match the public path Parse is exposed on (PARSE_MOUNT=/app → /app).
      REACT_APP_SERVERURL: "https://${APP_TRAEFIK_HOST}/app"
      # Must match APP_ID on the server — fixed value 'opensign'.
      REACT_APP_APPID: opensign

    networks:
      - proxy-public

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.priority=1"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-ui.loadbalancer.server.port=3000"

networks:
  proxy-public:
    external: true
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

secrets:
  DB_ROOT_PWD:
    file: ./.secrets/db_root_pwd.txt
