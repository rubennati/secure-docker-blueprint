services:

  # --------------------------------------------------------
  # MONGODB (OpenSign backend store)
  # --------------------------------------------------------
  db:
    image: mongo:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    security_opt:
      - no-new-privileges:true

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/DB_ROOT_PWD
      MONGO_INITDB_DATABASE: ${DB_NAME}
      TZ: ${TZ}
    secrets:
      - DB_ROOT_PWD

    volumes:
      - ./volumes/mongodb:/data/db

    networks:
      - app-internal

    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------
  # BACKEND (OpenSign Server — Parse Server + Express)
  # --------------------------------------------------------
  api:
    image: opensign/opensignserver:${APP_TAG}
    container_name: ${CONTAINER_NAME_API}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    security_opt:
      - no-new-privileges:true

    environment:
      TZ: ${TZ}
      APP_ID: ${APP_ID}
      MASTER_KEY: ${MASTER_KEY}
      # MongoDB DSN — no _FILE support, DB_ROOT_PWD_INLINE must match secret
      DATABASE_URI: "mongodb://${DB_ROOT_USER}:${DB_ROOT_PWD_INLINE}@db:27017/${DB_NAME}?authSource=admin"
      # Public URLs
      SERVER_URL: https://${APP_TRAEFIK_HOST}/app
      PUBLIC_URL: https://${APP_TRAEFIK_HOST}
      # SMTP for signature request emails
      MAILGUN_API_KEY: ${MAILGUN_API_KEY}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_SENDER: ${MAILGUN_SENDER}
      SMTP_ENABLE: ${SMTP_ENABLE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}

    volumes:
      - ./volumes/api-files:/usr/src/app/files

    networks:
      - proxy-public
      - app-internal

    labels:
      # API router — serves /app/* (Parse Server API)
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.rule=Host(`${APP_TRAEFIK_HOST}`) && (PathPrefix(`/app`) || PathPrefix(`/api`))"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.priority=100"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-api.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-api.loadbalancer.server.port=8080"

  # --------------------------------------------------------
  # FRONTEND (React app)
  # --------------------------------------------------------
  ui:
    image: opensign/opensign:${APP_TAG}
    container_name: ${CONTAINER_NAME_UI}
    restart: unless-stopped
    depends_on:
      - api

    security_opt:
      - no-new-privileges:true

    environment:
      TZ: ${TZ}
      # The React app reads these at runtime via /config.js generated by entrypoint
      REACT_APP_SERVER_URL: https://${APP_TRAEFIK_HOST}/app
      REACT_APP_APP_ID: ${APP_ID}
      REACT_APP_PUBLIC_URL: https://${APP_TRAEFIK_HOST}

    networks:
      - proxy-public

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.priority=1"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-ui.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}-ui.loadbalancer.server.port=3000"

networks:
  proxy-public:
    external: true
  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

secrets:
  DB_ROOT_PWD:
    file: ./.secrets/db_root_pwd.txt
