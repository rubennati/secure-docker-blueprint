services:
  app:
    image: invoiceninja/invoiceninja-debian:${APP_TAG}
    container_name: ${APP_CONTAINER}
    restart: unless-stopped
    # NOTE: Invoice Ninja reads DB_PASSWORD and IN_PASSWORD directly from
    # environment. A custom entrypoint to inject from Docker Secrets is
    # the path to full compliance — tracked as pre-✅ work.
    env_file:
      - ./.env
    volumes:
      # - ./php/php.ini:/usr/local/etc/php/conf.d/invoiceninja.ini:ro
      # - ./php/php-fpm.conf:/usr/local/etc/php-fpm.d/invoiceninja.conf:ro
      # - ./supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
    security_opt:
      - no-new-privileges:true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
          pids: 200
        reservations:
          memory: 256M

  nginx:
    image: nginx:${NGINX_TAG}
    container_name: ${NGINX_CONTAINER}
    restart: unless-stopped
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${NETWORK_NAME}"
      - "traefik.http.routers.${ROUTER_NAME}.rule=Host(`${HOST_DOMAIN}`)"
      - "traefik.http.routers.${ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${ROUTER_NAME}.tls=true"
      #- "traefik.http.routers.${ROUTER_NAME}.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.${ROUTER_NAME}.tls.options=${TLS_OPTION}@file"
      - "traefik.http.routers.${ROUTER_NAME}.middlewares=${MIDDLEWARES}"
      - "traefik.http.routers.${ROUTER_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
          pids: 50
        reservations:
          memory: 32M

  mysql:
    image: mysql:${MYSQL_TAG}
    container_name: ${MYSQL_CONTAINER}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"
          pids: 200
        reservations:
          memory: 256M

  redis:
    image: redis:${REDIS_TAG}
    container_name: ${REDIS_CONTAINER}
    restart: unless-stopped
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
          pids: 50
        reservations:
          memory: 64M

volumes:
  app_public:
    driver: local
  app_storage:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    driver: bridge
  proxy:
    external: true
    name: ${NETWORK_NAME}
