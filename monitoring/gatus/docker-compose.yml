services:

  # --------------------------------------------------------
  # GATUS (YAML-driven health checks + status page + alerts)
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: twinproduction/gatus:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      GATUS_CONFIG_PATH: /config
      # Auto-reload config on change — Gatus watches the file
      GATUS_LOG_LEVEL: ${LOG_LEVEL}

    # --- Storage ---
    # config/ holds config.yaml (and any included sub-configs).
    # data/ holds SQLite for result history (default) or point to
    # Postgres via storage.type in config.yaml.
    volumes:
      - ./config:/config:ro
      - ./volumes/data:/data

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true
