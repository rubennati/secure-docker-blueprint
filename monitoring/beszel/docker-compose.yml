services:

  # --------------------------------------------------------
  # BESZEL HUB (web UI + metric aggregator)
  # --------------------------------------------------------
  # The hub generates an Ed25519 keypair on first start and uses it
  # to SSH INTO each registered agent. Agents do not connect back to
  # the hub — the hub initiates all connections.
  #
  # This compose runs the hub + one LOCAL agent on the same host.
  # For additional hosts deploy monitoring/beszel-agent/ there.
  hub:
    # --- Identity ---
    image: henrygd/beszel:${APP_TAG}
    container_name: ${CONTAINER_NAME_HUB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}

    # --- Storage ---
    volumes:
      - ./volumes/hub-data:/beszel_data

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    # Beszel runs a minimal Go binary image — no wget/curl available.
    # Health is inferred from the container restart policy instead.
    healthcheck:
      disable: true

  # --------------------------------------------------------
  # BESZEL AGENT — local (this host)
  # --------------------------------------------------------
  # Collects CPU / RAM / disk / network / per-container Docker stats
  # for the host running the hub. The hub SSHes to this agent on
  # port 45876 using its generated private key.
  agent:
    # --- Identity ---
    image: henrygd/beszel-agent:${APP_TAG}
    container_name: ${CONTAINER_NAME_AGENT}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      PORT: "45876"
      # Hub's SSH public key — paste the full key from the hub UI
      # ("+ Add System", top right), including the "ssh-ed25519" type prefix.
      # Leave empty on first start; add key and restart agent after hub boots.
      KEY: ${AGENT_KEY}
      # Optional: comma-separated mount points beyond root FS.
      EXTRA_FILESYSTEMS: ${EXTRA_FILESYSTEMS}

    # --- Storage ---
    # Docker socket (read-only): agent reads container stats but cannot
    # start/stop/delete containers. Accepted exception — no Socket Proxy
    # equivalent covers docker-stats-style reads. Remove if container-level
    # metrics are not needed.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # --- Networking ---
    # network_mode: host — required for accurate host network interface
    # stats (eth0, tailscale0, etc.). Without it the agent sees only
    # the container's veth, not the real host interfaces. CPU / RAM /
    # disk still work with bridge networking if you prefer isolation.
    #
    # Security note: port 45876 binds directly on the host network stack,
    # not behind Traefik. Protection is SSH key auth + Tailscale ACLs /
    # host firewall. Same pattern as core/portainer-agent/ and core/hawser/.
    network_mode: host

    # --- Health & Observability ---
    # Agent runs on Alpine but upstream provides no healthcheck endpoint.
    # Hub status in the UI is the reliable liveness signal for the agent.
    healthcheck:
      disable: true

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true
