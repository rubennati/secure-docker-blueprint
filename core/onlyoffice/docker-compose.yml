services:

  # --------------------------------------------------------
  # ONLYOFFICE DOCUMENT SERVER
  # Central office document editing service.
  # Used by: Seafile, Nextcloud, or any app with WOPI support.
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: onlyoffice/documentserver:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # NOTE: OnlyOffice reads JWT_SECRET from env only — no _FILE support.
    # The entrypoint wrapper reads the Docker Secret and exports it.
    entrypoint: ["/bin/bash", "/config/entrypoint.sh", "/app/ds/run-document-server.sh"]
    environment:
      JWT_ENABLED: "true"
      WOPI_ENABLED: "true"
      TZ: ${TZ}
    secrets:
      - ONLYOFFICE_JWT_SECRET

    # --- Storage ---
    volumes:
      - ./config/entrypoint.sh:/config/entrypoint.sh:ro
      - ./volumes/data:/var/www/onlyoffice/Data
      - ./volumes/logs:/var/log/onlyoffice

    # --- Networking ---
    networks:
      - proxy-public

    # --- Traefik ---
    # OnlyOffice is embedded in iframes by Seafile/Nextcloud. Standard
    # sec-* middlewares set frameDeny:true which blocks this. Instead,
    # a dedicated -headers middleware below provides equivalent protection
    # but allows iframe embedding via Content-Security-Policy frame-ancestors.
    labels:
      # Router
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares (access + custom proto + custom headers)
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${COMPOSE_PROJECT_NAME}-proto@docker,${COMPOSE_PROJECT_NAME}-headers@docker"
      # Proxy headers: OnlyOffice sits behind Traefik's TLS termination.
      # Without X-Forwarded-Proto it generates http:// URLs → Mixed Content errors.
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-proto.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-proto.headers.customrequestheaders.X-Forwarded-Host=${APP_TRAEFIK_HOST}"
      # Security headers: equivalent to hdr-basic but iframe-friendly.
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.${COMPOSE_PROJECT_NAME}-headers.headers.contentSecurityPolicy=frame-ancestors 'self' ${ONLYOFFICE_ALLOWED_ORIGINS}"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/healthcheck >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  ONLYOFFICE_JWT_SECRET:
    file: ./.secrets/jwt_secret.txt
