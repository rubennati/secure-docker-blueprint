services:

  # --------------------------------------------------------
  # DOCKER SOCKET PROXY (Portainer → Docker API)
  # Restricts which Docker API endpoints Portainer can access.
  # --------------------------------------------------------
  socket-proxy:
    # --- Identity ---
    image: lscr.io/linuxserver/socket-proxy:${SOCKET_PROXY_TAG}
    container_name: ${CONTAINER_NAME_SOCKET_PROXY}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
      - /tmp

    # --- Configuration ---
    environment:
      CONTAINERS: "1"
      SERVICES: "1"
      NETWORKS: "1"
      VOLUMES: "1"
      IMAGES: "1"
      INFO: "1"
      EVENTS: "1"
      PING: "1"
      VERSION: "1"
      SYSTEM: "1"
      EXEC: "1"
      POST: "1"
      DELETE: "1"
      ALLOW_START: "1"
      ALLOW_STOP: "1"
      ALLOW_RESTARTS: "1"

    # --- Storage ---
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2375/_ping >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------
  # PORTAINER CE
  # Docker management UI. Connects to Docker API
  # exclusively through the socket proxy above.
  # --------------------------------------------------------
  app:
    # --- Identity ---
    image: portainer/portainer-ce:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    depends_on:
      socket-proxy:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
    command: --host tcp://socket-proxy:2375

    # --- Storage ---
    volumes:
      - ./volumes/data:/data

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=9000"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"

    # --- Health & Observability ---
    # Portainer's image ships its own /healthcheck binary — the image
    # HEALTHCHECK directive is used. Do not override here: the Portainer
    # image has no wget / curl / shell, so any custom test will fail.

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true
