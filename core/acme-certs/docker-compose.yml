services:

  # --------------------------------------------------------
  # ACME-CERTS (cert-ops-tool)
  # Let's Encrypt / ZeroSSL certificate tool using acme.sh.
  # Issues and renews certs via Cloudflare DNS-01 challenge.
  #
  # Use for devices without Traefik (NAS, routers, etc.).
  # Runs crond in foreground for automatic renewal.
  #
  # Image source: https://github.com/rubennati/cert-ops-tool
  #
  # Usage:
  #   ./scripts/wizard.sh                      Interactive certificate wizard (host-side)
  #   docker compose exec acme-certs /scripts/issue.sh
  #   docker compose exec acme-certs /scripts/renew.sh
  #   docker compose exec acme-certs /scripts/convert-to-pfx.sh <domain> <password>
  # --------------------------------------------------------
  acme-certs:
    # --- Identity ---
    image: ghcr.io/rubennati/cert-ops-tool:${APP_TAG}
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      TZ: ${TZ}
      ACME_EMAIL: ${ACME_EMAIL}
      CERT_DOMAIN: ${CERT_DOMAIN}
      CERT_SAN: ${CERT_SAN}
      CERT_KEYLENGTH: ${CERT_KEYLENGTH}
      ACME_SERVER: ${ACME_SERVER}
    secrets:
      - CF_TOKEN

    # --- Storage ---
    volumes:
      - ./volumes/acme:/acme.sh
      - ./volumes/output:/output

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  CF_TOKEN:
    file: ./.secrets/cf_token.txt
