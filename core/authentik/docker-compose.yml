services:

  # --------------------------------------------------------
  # INIT — volume permission fix-up (one-shot)
  # --------------------------------------------------------
  # The goauthentik/server image runs as UID 1000 and refuses to
  # self-fix permissions on bind-mounted volumes. This short-lived
  # Alpine container creates the required subdirectories and chowns
  # them to 1000:1000 before server/worker start. Exits in <1s;
  # idempotent on every `docker compose up -d`.
  #
  # Upstream reference:
  #   https://docs.goauthentik.io/troubleshooting/image_upload/
  init-perms:
    image: ${INIT_IMAGE}
    container_name: ${CONTAINER_NAME_INIT}
    user: "0:0"
    restart: "no"
    entrypoint: ["/bin/sh", "/init.sh"]

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Storage ---
    volumes:
      - ./ops/scripts/init-volumes.sh:/init.sh:ro
      - ./volumes/data:/mnt/data
      - ./volumes/certs:/mnt/certs
      - ./volumes/custom-templates:/mnt/custom-templates

  # --------------------------------------------------------
  # POSTGRESQL
  # --------------------------------------------------------
  db:
    # --- Identity ---
    image: postgres:${DB_TAG}
    container_name: ${CONTAINER_NAME_DB}
    restart: unless-stopped

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/DB_PWD
      TZ: ${TZ}
    secrets:
      - DB_PWD

    # --- Storage ---
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h 127.0.0.1 || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 5

  # --------------------------------------------------------
  # REDIS (session store + cache)
  # --------------------------------------------------------
  redis:
    # --- Identity ---
    image: redis:${REDIS_TAG}
    container_name: ${CONTAINER_NAME_REDIS}
    restart: unless-stopped
    command: --save 60 1 --loglevel warning

    # --- Security ---
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

    # --- Storage ---
    volumes:
      - ./volumes/redis:/data

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------
  # AUTHENTIK SERVER (Web UI + API)
  # --------------------------------------------------------
  server:
    # --- Identity ---
    image: ghcr.io/goauthentik/server:${APP_TAG}
    container_name: ${CONTAINER_NAME_SERVER}
    restart: unless-stopped
    command: server
    depends_on:
      init-perms:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    # Authentik reads values prefixed "file://" by reading the target file —
    # its native equivalent of the _FILE pattern.
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__USER: ${DB_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${DB_NAME}
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/DB_PWD
      AUTHENTIK_SECRET_KEY: file:///run/secrets/AUTHENTIK_SECRET_KEY
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_EMAIL__HOST: ${SMTP_HOST}
      AUTHENTIK_EMAIL__PORT: ${SMTP_PORT}
      AUTHENTIK_EMAIL__USERNAME: ${SMTP_USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: file:///run/secrets/SMTP_PASSWORD
      AUTHENTIK_EMAIL__USE_TLS: ${SMTP_USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${SMTP_USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${SMTP_TIMEOUT}
      AUTHENTIK_EMAIL__FROM: ${SMTP_FROM}
      TZ: ${TZ}
    secrets:
      - DB_PWD
      - AUTHENTIK_SECRET_KEY
      - SMTP_PASSWORD

    # --- Storage ---
    # Authentik migrated from /media to /data; keep mounts aligned with
    # the current image. Pre-chowned to UID 1000 by the init-perms service.
    volumes:
      - ./volumes/data:/data
      - ./volumes/custom-templates:/templates

    # --- Networking ---
    networks:
      - proxy-public
      - app-internal

    # --- Traefik ---
    labels:
      # Router (main — all traffic)
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${APP_TRAEFIK_HOST}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      # TLS
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      #- "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=${APP_TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      # Middlewares
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.middlewares=${APP_TRAEFIK_ACCESS}@file,${APP_TRAEFIK_SECURITY}@file"
      # Service
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=${APP_INTERNAL_PORT}"
      # Router (static assets — bypasses rate limit)
      # Authentik is a code-split SPA: /_static/ delivers 100+ JS/CSS chunks in
      # parallel on first visit. Without a dedicated router these requests hit the
      # main rate-limiter and return 429. sec-1 (no rate limit) is safe here
      # because the files are public static assets, not authentication endpoints.
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.rule=Host(`${APP_TRAEFIK_HOST}`) && PathPrefix(`/_static/`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.tls.options=${APP_TRAEFIK_TLS_OPTION}@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.middlewares=${APP_TRAEFIK_ACCESS}@file,sec-1@file"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.service=${COMPOSE_PROJECT_NAME}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}-static.priority=100"

    # --- Health & Observability ---
    # The goauthentik/server image ships no wget/curl. Use Python
    # (which IS in the image) to hit the live endpoint. start_period
    # accounts for cold-start Django migrations (60–90s on first boot).
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9000/-/health/live/').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --------------------------------------------------------
  # AUTHENTIK WORKER (background jobs, email, sync)
  # --------------------------------------------------------
  worker:
    # --- Identity ---
    image: ghcr.io/goauthentik/server:${APP_TAG}
    container_name: ${CONTAINER_NAME_WORKER}
    restart: unless-stopped
    command: worker
    depends_on:
      init-perms:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    # --- Security ---
    security_opt:
      - no-new-privileges:true

    # --- Configuration ---
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__USER: ${DB_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${DB_NAME}
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/DB_PWD
      AUTHENTIK_SECRET_KEY: file:///run/secrets/AUTHENTIK_SECRET_KEY
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_EMAIL__HOST: ${SMTP_HOST}
      AUTHENTIK_EMAIL__PORT: ${SMTP_PORT}
      AUTHENTIK_EMAIL__USERNAME: ${SMTP_USERNAME}
      AUTHENTIK_EMAIL__PASSWORD: file:///run/secrets/SMTP_PASSWORD
      AUTHENTIK_EMAIL__USE_TLS: ${SMTP_USE_TLS}
      AUTHENTIK_EMAIL__USE_SSL: ${SMTP_USE_SSL}
      AUTHENTIK_EMAIL__TIMEOUT: ${SMTP_TIMEOUT}
      AUTHENTIK_EMAIL__FROM: ${SMTP_FROM}
      TZ: ${TZ}
    secrets:
      - DB_PWD
      - AUTHENTIK_SECRET_KEY
      - SMTP_PASSWORD

    # --- Storage ---
    # Authentik migrated from /media to /data; keep mounts aligned with
    # the current image. Pre-chowned to UID 1000 by the init-perms service.
    volumes:
      - ./volumes/data:/data
      - ./volumes/certs:/certs
      - ./volumes/custom-templates:/templates

    # --- Networking ---
    networks:
      - app-internal

    # --- Health & Observability ---
    # Upstream removed the built-in worker healthcheck in 2025.10.2.
    # Explicitly disabled so Docker does not report a spurious
    # "starting" state indefinitely.
    healthcheck:
      disable: true

# --------------------------------------------------------
# NETWORKS
# --------------------------------------------------------
networks:
  proxy-public:
    external: true

  app-internal:
    name: ${COMPOSE_PROJECT_NAME}-internal
    internal: true

# --------------------------------------------------------
# SECRETS
# --------------------------------------------------------
secrets:
  DB_PWD:
    file: ./.secrets/db_pwd.txt
  AUTHENTIK_SECRET_KEY:
    file: ./.secrets/authentik_secret_key.txt
  SMTP_PASSWORD:
    file: ./.secrets/smtp_password.txt
