# =============================================
# CrowdSec – Log Acquisition
# =============================================
# Defines which log sources CrowdSec monitors.
# Traefik must write access logs in JSON format.
# =============================================

# Traefik access logs (JSON format)
# KNOWN ISSUE: Live parsing not working with file-based acquisition.
# traefik-logs parser v1.5 needs evt.Parsed.program which file acquisition
# doesn't set. Manual cscli explain works. See bugfix doc for details.
# Tracking: https://github.com/crowdsecurity/hub/issues/1677
filenames:
  - /var/log/traefik/access.log
labels:
  type: traefik
